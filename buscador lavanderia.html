<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador Lavandería - SGO 5300</title>
    <!-- Intenta primero con unpkg -->
    <script src="https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        header {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #475569;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .title-section h1 {
            margin: 0 0 5px 0;
            font-size: 28px;
            font-weight: bold;
            color: #fbbf24;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .title-section p {
            margin: 0;
            font-size: 13px;
            color: #94a3b8;
            letter-spacing: 0.5px;
        }

        .stats {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .stat-item {
            font-size: 13px;
            color: #cbd5e1;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .hidden {
            display: none !important;
        }

        .upload-zone {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .upload-label {
            cursor: pointer;
            width: 100%;
        }

        .upload-box {
            border: 2px dashed #fbbf24;
            border-radius: 12px;
            padding: 60px 20px;
            text-align: center;
            background: rgba(251, 191, 36, 0.05);
            transition: all 0.3s ease;
        }

        .upload-box:hover {
            background: rgba(251, 191, 36, 0.1);
            border-color: #fcd34d;
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .upload-text {
            font-size: 18px;
            font-weight: 600;
            margin: 10px 0;
            color: #fbbf24;
        }

        .upload-hint {
            font-size: 13px;
            color: #94a3b8;
            margin: 5px 0 0 0;
        }

        #fileInput, #fileInput2 {
            display: none;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            color: #fca5a5;
            padding: 12px 16px;
            border-radius: 6px;
            margin: 10px 0;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid #22c55e;
            color: #86efac;
            padding: 12px 16px;
            border-radius: 6px;
            margin: 10px 0;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        .search-section {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .change-file-row {
            margin-bottom: 15px;
        }

        .change-file-btn {
            cursor: pointer;
            font-size: 12px;
            padding: 6px 12px;
            background: rgba(100, 116, 139, 0.3);
            border: 1px solid #64748b;
            border-radius: 4px;
            color: #cbd5e1;
            transition: all 0.2s ease;
        }

        .change-file-btn:hover {
            background: rgba(100, 116, 139, 0.5);
        }

        .search-controls {
            margin-bottom: 20px;
        }

        .filter-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 16px;
            border: 1px solid #475569;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            background: rgba(71, 85, 105, 0.3);
            color: #cbd5e1;
        }

        .filter-btn.active {
            background: #fbbf24;
            color: #0f172a;
            border-color: #fbbf24;
        }

        .filter-btn:hover:not(.active) {
            background: rgba(71, 85, 105, 0.5);
        }

        #searchInput {
            width: 100%;
            padding: 12px 16px;
            font-size: 16px;
            background: #1e293b;
            border: 2px solid #475569;
            border-radius: 8px;
            color: #e2e8f0;
            outline: none;
            transition: border-color 0.3s ease;
        }

        #searchInput:focus {
            border-color: #fbbf24;
        }

        .results-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            margin-top: 10px;
        }

        .result-count {
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 12px;
            margin-top: 5px;
        }

        .results-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .result-card {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 1px solid #475569;
            border-radius: 8px;
            padding: 14px 16px;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .result-card:hover {
            border-color: #fbbf24;
            background: linear-gradient(135deg, #334155 0%, #1e293b 100%);
            box-shadow: 0 0 10px rgba(251, 191, 36, 0.2);
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .result-left {
            flex: 1;
        }

        .result-ot {
            font-size: 12px;
            color: #fbbf24;
            font-weight: bold;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }

        .result-nombre {
            font-size: 15px;
            color: #f1f5f9;
            font-weight: 600;
            margin-bottom: 3px;
        }

        .result-empresa {
            font-size: 12px;
            color: #94a3b8;
        }

        .result-right {
            text-align: right;
            margin-left: 15px;
        }

        .ubicacion-badge {
            font-size: 11px;
            color: #64748b;
            margin-bottom: 3px;
            font-weight: 600;
        }

        .ubicacion-value {
            font-size: 18px;
            font-weight: bold;
            color: #fbbf24;
            background: rgba(251, 191, 36, 0.1);
            padding: 4px 10px;
            border-radius: 4px;
            display: inline-block;
        }

        .no-results {
            text-align: center;
            padding: 40px 20px;
            color: #94a3b8;
        }

        .no-results-text {
            font-size: 16px;
            margin: 0 0 8px 0;
        }

        .no-results-hint {
            font-size: 13px;
            margin: 0;
            color: #64748b;
        }

        footer {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #475569;
            text-align: center;
            font-size: 12px;
            color: #64748b;
        }

        .debug-info {
            font-size: 11px;
            color: #64748b;
            padding: 8px;
            background: rgba(71, 85, 105, 0.2);
            border-radius: 4px;
            margin-top: 10px;
            font-family: 'Courier New', monospace;
        }

        @media (max-width: 600px) {
            .result-row {
                flex-direction: column;
                align-items: flex-start;
            }

            .result-right {
                margin-left: 0;
                margin-top: 10px;
            }

            header {
                flex-direction: column;
                align-items: flex-start;
            }

            .title-section h1 {
                font-size: 22px;
            }
        }

        .results-section::-webkit-scrollbar {
            width: 8px;
        }

        .results-section::-webkit-scrollbar-track {
            background: rgba(71, 85, 105, 0.2);
            border-radius: 10px;
        }

        .results-section::-webkit-scrollbar-thumb {
            background: rgba(251, 191, 36, 0.5);
            border-radius: 10px;
        }

        .results-section::-webkit-scrollbar-thumb:hover {
            background: rgba(251, 191, 36, 0.8);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="title-section">
                <h1>🔍 BUSCADOR LAVANDERÍA</h1>
                <p>SGO 5300 - Pampa Lina</p>
            </div>
            <div class="stats" id="stats" style="display: none;">
                <span class="stat-item" id="statItem"></span>
            </div>
        </header>

        <div id="successMessage" class="success-message"></div>
        <div id="errorMessage" class="error-message"></div>

        <div id="uploadZone" class="upload-zone">
            <label class="upload-label">
                <div class="upload-box">
                    <div class="upload-icon">📁</div>
                    <p class="upload-text">Arrastra el Excel aquí o haz click</p>
                    <p class="upload-hint">Inventario_XX-XX-XXXX.xlsx o .csv</p>
                </div>
                <input type="file" id="fileInput" accept=".xlsx,.xls,.csv">
            </label>
        </div>

        <div id="searchSection" class="search-section hidden">
            <div class="change-file-row">
                <label class="change-file-btn">
                    ↻ Cambiar archivo
                    <input type="file" id="fileInput2" accept=".xlsx,.xls,.csv">
                </label>
            </div>

            <div class="search-controls">
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="todos">Todos</button>
                    <button class="filter-btn" data-filter="ot">Por OT</button>
                    <button class="filter-btn" data-filter="nombre">Por Nombre</button>
                </div>
                <input type="text" id="searchInput" placeholder="Busca por OT o nombre..." autofocus>
            </div>

            <div class="results-section">
                <p class="result-count" id="resultCount"></p>
                <div id="resultsList" class="results-list"></div>
            </div>
        </div>
    </div>

    <footer>
        <p>Le Grand Chic SpA © 2026 | Sistema de Búsqueda Lavandería</p>
        <p style="font-size: 11px; color: #94a3b8; margin-top: 5px;">Creado por Leonardo Rebolledo</p>
    </footer>

    <script>
        let allData = [];
        let currentFilter = 'todos';
        let xlsxLoaded = false;

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = '⚠️ ' + message;
            errorDiv.classList.add('show');
            console.error('Error:', message);
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = '✅ ' + message;
            successDiv.classList.add('show');
            setTimeout(() => {
                successDiv.classList.remove('show');
            }, 3000);
        }

        // Parsear CSV manualmente
        function parseCSV(text) {
            const lines = text.split('\n').filter(line => line.trim());
            if (lines.length < 2) throw new Error('Archivo CSV vacío');

            const headers = lines[0].split(',').map(h => h.trim());
            const otIndex = headers.findIndex(h => h.toUpperCase() === 'OT');
            const ubicIndex = headers.findIndex(h => h.toUpperCase() === 'UBICACIÓN');
            const nombreIndex = headers.findIndex(h => h.toUpperCase() === 'NOMBRE');
            const empresaIndex = headers.findIndex(h => h.toUpperCase().includes('EMPRESA'));

            if (otIndex === -1 || ubicIndex === -1 || nombreIndex === -1) {
                throw new Error('Columnas requeridas no encontradas: OT, UBICACIÓN, NOMBRE');
            }

            const data = [];
            for (let i = 1; i < lines.length; i++) {
                const cols = lines[i].split(',').map(c => c.trim());
                if (cols[otIndex]) {
                    data.push({
                        ot: String(cols[otIndex]),
                        ubicacion: String(cols[ubicIndex] || ''),
                        nombre: String(cols[nombreIndex] || ''),
                        empresa: empresaIndex >= 0 ? String(cols[empresaIndex] || '') : ''
                    });
                }
            }
            return data;
        }

        // Parsear Excel con XLSX
        function parseExcel(arrayBuffer) {
            if (typeof XLSX === 'undefined') {
                throw new Error('Librería XLSX no disponible. Asegúrate de usar un archivo CSV o intenta en otro navegador.');
            }

            const data = new Uint8Array(arrayBuffer);
            const workbook = XLSX.read(data, { type: 'array' });
            const worksheet = workbook.Sheets[workbook.SheetNames[0]];
            const jsonData = XLSX.utils.sheet_to_json(worksheet);

            return jsonData
                .filter(row => row.OT && row.UBICACIÓN && row.NOMBRE)
                .map(row => ({
                    ot: String(row.OT).trim(),
                    ubicacion: String(row.UBICACIÓN).trim(),
                    nombre: String(row.NOMBRE).trim(),
                    empresa: row['EMPRESA '] ? String(row['EMPRESA ']).trim() : '',
                }));
        }

        function loadFile(file) {
            if (!file) return;

            const reader = new FileReader();
            
            reader.onload = (e) => {
                try {
                    let parsedData = [];

                    if (file.name.endsWith('.csv')) {
                        // Parsear como CSV
                        const text = e.target.result;
                        parsedData = parseCSV(text);
                    } else if (file.name.endsWith('.xlsx') || file.name.endsWith('.xls')) {
                        // Intentar parsear como Excel
                        if (typeof XLSX === 'undefined') {
                            // Si XLSX no está disponible, intentar como CSV
                            showError('Excel no soportado en este navegador. Convierte a CSV (Excel → Guardar como → CSV)');
                            return;
                        }
                        parsedData = parseExcel(e.target.result);
                    } else {
                        throw new Error('Formato de archivo no soportado');
                    }

                    if (parsedData.length === 0) {
                        throw new Error('No se encontraron datos válidos. Verifica que tenga: OT, UBICACIÓN, NOMBRE');
                    }

                    allData = parsedData;

                    // Actualizar UI
                    document.getElementById('uploadZone').classList.add('hidden');
                    document.getElementById('searchSection').classList.remove('hidden');
                    document.getElementById('stats').style.display = 'flex';
                    document.getElementById('statItem').textContent = 
                        `📊 ${allData.length.toLocaleString()} registros cargados`;
                    document.getElementById('searchInput').focus();
                    document.getElementById('resultsList').innerHTML = '';

                    showSuccess(`${file.name} cargado exitosamente (${allData.length} registros)`);
                } catch (error) {
                    console.error('Error detallado:', error);
                    showError(error.message);
                }
            };

            reader.onerror = () => {
                showError('Error al leer el archivo');
            };

            if (file.name.endsWith('.csv')) {
                reader.readAsText(file);
            } else {
                reader.readAsArrayBuffer(file);
            }
        }

        function search() {
            const term = document.getElementById('searchInput').value.toLowerCase().trim();
            if (!term) {
                document.getElementById('resultsList').innerHTML = '';
                document.getElementById('resultCount').textContent = '';
                return;
            }

            let resultados = allData.filter(item => {
                if (currentFilter === 'ot') {
                    return item.ot.includes(term);
                } else if (currentFilter === 'nombre') {
                    return item.nombre.toLowerCase().includes(term);
                } else {
                    return item.ot.includes(term) || item.nombre.toLowerCase().includes(term);
                }
            }).slice(0, 50);

            if (resultados.length === 0) {
                document.getElementById('resultCount').textContent = '';
                document.getElementById('resultsList').innerHTML = `
                    <div class="no-results">
                        <p class="no-results-text">❌ No se encontraron resultados</p>
                        <p class="no-results-hint">Intenta con otro término de búsqueda</p>
                    </div>
                `;
            } else {
                document.getElementById('resultCount').textContent = 
                    resultados.length === 1 
                        ? '1 resultado encontrado' 
                        : `${resultados.length} resultados encontrados`;

                document.getElementById('resultsList').innerHTML = resultados
                    .map(item => `
                        <div class="result-card">
                            <div class="result-row">
                                <div class="result-left">
                                    <div class="result-ot">OT ${item.ot}</div>
                                    <div class="result-nombre">${item.nombre}</div>
                                    ${item.empresa ? `<div class="result-empresa">${item.empresa}</div>` : ''}
                                </div>
                                <div class="result-right">
                                    <div class="ubicacion-badge">📍 Casillero</div>
                                    <div class="ubicacion-value">${item.ubicacion}</div>
                                </div>
                            </div>
                        </div>
                    `).join('');
            }
        }

        // Event Listeners
        document.getElementById('fileInput').addEventListener('change', (e) => loadFile(e.target.files[0]));
        document.getElementById('fileInput2').addEventListener('change', (e) => loadFile(e.target.files[0]));
        document.getElementById('searchInput').addEventListener('input', search);

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                search();
            });
        });

        // Drag and drop
        const uploadZone = document.getElementById('uploadZone');
        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadZone.style.opacity = '0.7';
        });

        uploadZone.addEventListener('dragleave', () => {
            uploadZone.style.opacity = '1';
        });

        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.style.opacity = '1';
            const file = e.dataTransfer.files[0];
            if (file) {
                loadFile(file);
            }
        });

        // Verificar XLSX
        window.addEventListener('load', () => {
            if (typeof XLSX !== 'undefined') {
                console.log('✅ XLSX cargado correctamente');
                xlsxLoaded = true;
            } else {
                console.warn('⚠️ XLSX no disponible - solo funcionará CSV');
            }
        });

        // Log inicial
        console.log('🚀 Buscador Lavandería iniciado');
        console.log('Soporta: .xlsx, .xls, .csv');
    </script>
</body>
</html>
